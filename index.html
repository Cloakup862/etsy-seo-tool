<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Etsy SEO Tag Generator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="page">

    <section class="hero">
      <h1>Etsy SEO Tag Generator</h1>
      <p>
        Generate 13 high-converting Etsy tags based on real buyer search intent.
      </p>
    </section>

    <section class="app-card">
      <form id="seo-form">

        <h2>Product Info</h2>

        <input
          id="title"
          type="text"
          placeholder="Personalized teacher tote bag"
          required
        />

        <textarea
          id="description"
          placeholder="Describe your product, audience, material, and use case..."
          required
        ></textarea>

        <button type="submit">Generate Tags</button>

      </form>

      <div class="results">
        <h2>Generated Tags</h2>

        <ul id="tag-list"></ul>

        <textarea id="comma-output" readonly></textarea>

        <button id="copy-button">Copy Tags</button>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
